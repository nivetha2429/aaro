<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <title>Aaro Systems | Premium Gadgets & Electronics</title>

  <!-- SEO -->
  <meta name="description" content="Shop the latest smartphones, laptops, and electronics at Aaro Systems. Best prices, free shipping, and 1-year warranty on all products." />
  <meta name="keywords" content="smartphones, laptops, electronics, phones, gadgets, Aaro Systems, buy phones online, buy laptops online, premium electronics" />
  <meta name="author" content="Aaro Systems" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://aaro.onrender.com/" />

  <!-- Theme & PWA -->
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Aaro" />
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS / Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Aaro" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Aaro Systems" />
  <meta property="og:title" content="Aaro Systems | Premium Gadgets & Electronics" />
  <meta property="og:description" content="Shop the latest smartphones, laptops, and electronics. Best prices, free shipping, and 1-year warranty." />
  <meta property="og:url" content="https://aaro.onrender.com/" />
  <meta property="og:image" content="https://aaro.onrender.com/logo.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@AaroSystems" />
  <meta name="twitter:title" content="Aaro Systems | Premium Gadgets & Electronics" />
  <meta name="twitter:description" content="Shop the latest smartphones, laptops, and electronics. Best prices, free shipping." />
  <meta name="twitter:image" content="https://aaro.onrender.com/logo.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "Aaro Systems",
    "description": "Premium smartphones, laptops, and electronics store",
    "url": "https://aaro.onrender.com",
    "logo": "https://aaro.onrender.com/logo.png",
    "image": "https://aaro.onrender.com/logo.png",
    "priceRange": "$$",
    "telephone": "+917010452495",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "IN"
    },
    "sameAs": [
      "https://instagram.com/aaro"
    ]
  }
  </script>
</head>

<body>
  <div id="root">
    <!-- Initial loader shown before React hydrates -->
    <div id="initial-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(-45deg,#f3e8ff,#e9d5ff,#f5f3ff,#f8f0ff);flex-direction:column;gap:20px;">
      <img src="/logo.png" alt="AARO" style="height:72px;width:auto;animation:aaroLogoP 1.8s ease-in-out infinite;" />
      <div style="width:120px;height:4px;border-radius:999px;background:rgba(124,58,237,0.1);overflow:hidden;position:relative;">
        <div style="position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.6),transparent);animation:aaroShim 1.4s ease-in-out infinite;"></div>
      </div>
      <div style="display:flex;gap:6px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:aaroDot 1.4s ease-in-out infinite;animation-delay:0s;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:aaroDot 1.4s ease-in-out infinite;animation-delay:0.2s;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:aaroDot 1.4s ease-in-out infinite;animation-delay:0.4s;"></div>
      </div>
    </div>
    <style>
      @keyframes aaroLogoP{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
      @keyframes aaroShim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
      @keyframes aaroDot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
    </style>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
